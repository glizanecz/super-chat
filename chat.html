<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Super Chat</title>
    <link rel="icon" href="./messageSymbol.png" type="image/png">
    <style>
        .background {
            background-color: rgb(165, 216, 234);
            border-radius: 20px;
            border: 2px solid rgb(29, 108, 168);
            display: grid;
            place-items: center;
            resize: vertical;
            padding: 10px;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif
            /* I meant padding */ 
        }
    </style>
  </head>
  <body>
    <main>
        <div class="background">
            <h2>Welcome to Super Chat</h2>  
            <h3>Chat Log:</h3>  
            <textarea readonly id="chats" placeholder="The conversation starts here..."></textarea>
            <h3>Type Area:</h3>  
            <textarea id="typehere" placeholder="Type your message here..."></textarea><h2 style="float: right">⚙️</h2>
            <br>
            <button id="sendMsgBtn">Send Message</button>
        </div>
    </main>
    <script type="module">
      const sendMsgBtn = document.getElementById("sendMsgBtn");
      const typeHere = document.getElementById("typehere");
      const chats = document.getElementById("chats");
      let username = "JoePlayz23"

      sendMsgBtn.onclick = function() {
        chats.value = username + ": " + formatValues();
        typeHere.value = "";
      }

      function formatValues() {
        let chatArray = typeHere.value.split("\n")
        let newChatOrdered = [];
        for (let i = (chatArray.length - 1); i > 0; i--) {
          newChatOrdered.push(chatArray[i]);
        }
        return newChatOrdered;
      }
    </script>
  </body>
</html>
