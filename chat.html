      async function uploadToServer() {
        await setDoc(saveRef, {
          lastUsername: username,
          lastChatDate: serverTimestamp(),
          lastMessage: latestChat,
        })
      }

      function formatValues() {
        let newChatOrdered = [];
        for (let i = (chatLog.length - 1); i >= 0; i--) {
          newChatOrdered.push(chatLog[i]);
        }
        return newChatOrdered.join("\n");
      }

      onSnapshot(saveRef, (docSnap) => {
        if (!docSnap.exists()) return

        const data = docSnap.data();

        if (data.lastMessage === latestChat) return
        if (!data.lastMessage) return;

        const serverTimeNumber = data.lastChatDate.toDate().getTime();
        serverTimeOffset = serverTimeNumber - Date.now();

        const sentAt = data.lastChatDate?.toDate ? data.lastChatDate.toDate().toLocaleTimeString() : "pending";

        latestChat = sentAt + " | " + data.lastMessage;
        chatLog.push(latestChat);
        chats.value = formatValues();
      })

      async function checkProfanityAI(text) {
        const prompt = `
            You are a profanity checker.

            Answer ONLY YES or NO.

            YES = the text is clean and allowed.
            NO = the text has profanity, slurs, threats, sexual content, harassment, or abusive insults.

            Text:
            ${JSON.stringify(text)}
        `;

        try {
          const result = await model.generateContent(prompt);
          const answer = result.response.text().trim().toUpperCase();
          if (answer.startsWith("YES")) {
            return "YES";
          }

          return "NO";
        } catch (error) {
          errorMsgBox.style.display = "block";
          errorMsgBox.innerText = "Something went wrong with our moderation checker, try again later..." + "\n" + "No, refreshing WON'T help."
          await sleep(cooldown)
        }
      }

      async function startCoolDown() {
        typeHere.value = "";

          if (snapshotOfSettings.exists()) {
            const data = snapshotOfSettings.data();
            cooldown = data.cooldown;
          } else {
            cooldown = 3000;
          }
        } catch (error) {

          errorMsgBox.style.display = "block";
          errorMsgBox.innerText = "Something went wrong with fetching data from the server, try again later..." + "\n" + "No, refreshing WON'T help."
        }
        let coolDownTime = cooldown / 1000;
        sendMsgBtn.style.opacity = ".5";
        sendMsgBtn.innerText = "On Cooldown: " + coolDownTime + "s";
        await sleep(1000)
        for (let i = 1; i < coolDownTime; i++) {

          await sleep(1000)
        }
        sendMsgBtn.style.opacity = "1";
        sendMsgBtn.innerText = "Send Message";
        cooltimeOver = 1;
      }
