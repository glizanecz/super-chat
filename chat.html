<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Super Chat</title>
    <link rel="icon" href="./messageSymbol.png" type="image/png">
    <style>
        .background {
            background-color: rgb(165, 216, 234);
            border-radius: 20px;
            border: 2px solid rgb(29, 108, 168);
            display: grid;
            place-items: center;
            resize: vertical;
            padding: 10px;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif
            /* I meant padding */ 
        }

        .welcome {
          text-decoration: underline wavy;
        }
    </style>
  </head>
  <body>
    <main>
        <div class="background">
            <h2 class="welcome">Welcome to Super Chat</h2>  
            <h3>Chat Log:</h3>  
            <textarea readonly id="chats" placeholder="The conversation starts here..."></textarea>
            <h3>Type Area:</h3>  
            <textarea id="typehere" placeholder="Type your message here..."></textarea><h2 style="float: right">⚙️</h2>
            <br>
            <button id="sendMsgBtn">Send Message</button>
        </div>
    </main>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-analytics.js";

      import {
        getFirestore,
        doc,
        setDoc,
        onSnapshot,
        serverTimestamp
      } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCSUeplNuF3klbleAVc5jhYZz9XfYLqe6Y",
        authDomain: "super-chat-c83b0.firebaseapp.com",
        projectId: "super-chat-c83b0",
        storageBucket: "super-chat-c83b0.firebasestorage.app",
        messagingSenderId: "849823772763",
        appId: "1:849823772763:web:679ef60cdd931473604f7e",
        measurementId: "G-C360M28XHZ"
      };


      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const analytics = getAnalytics(app);
      const sendMsgBtn = document.getElementById("sendMsgBtn");
      const typeHere = document.getElementById("typehere");
      const chats = document.getElementById("chats");
      const saveRef = doc(db, "chats", "messages")

      const adjectives = [
        "Swift",
        "Silent",
        "Shadow",
        "Electric",
        "Crimson",
        "Frozen",
        "Golden",
        "Rapid",
        "Cyber",
        "Dark",
        "Bright",
        "Lucky",
        "Iron",
        "Stormy",
        "Wild",
        "Crazy",
        "Sneaky",
        "Epic",
        "Hyper",
        "Mystic",
        "Broken",
        "Atomic",
        "Cosmic",
        "Lunar",
        "Solar",
        "Turbo",
        "Pixel",
        "Glowing",
        "Burning",
        "Shiny",
        "Massive",
        "Tiny",
        "Ghostly",
        "Royal",
        "Toxic",
        "Icy",
        "Fiery",
        "Thunder",
        "Frosty",
        "Dangerous",
        "Radiant",
        "Hidden",
        "Magic",
        "Stealthy",
        "Infinite",
        "Electric",
        "Neon",
        "Savage",
        "Vicious",
        "Ancient"
      ];

      const nouns = [
        "Hacker",
        "Biker",
        "Coder",
        "Warrior",
        "Knight",
        "Runner",
        "Hunter",
        "Wizard",
        "Ninja",
        "Pirate",
        "Gamer",
        "Driver",
        "Artist",
        "Builder",
        "Explorer",
        "Soldier",
        "Samurai",
        "Rider",
        "Engineer",
        "Scientist",
        "Streamer",
        "Creator",
        "Miner",
        "Farmer",
        "Pilot",
        "Captain",
        "Detective",
        "Spy",
        "Inventor",
        "Champion",
        "Boxer",
        "Skater",
        "Surfer",
        "Fighter",
        "Guardian",
        "Assassin",
        "Traveler",
        "Nomad",
        "Mercenary",
        "Robot",
        "Android",
        "Dragon",
        "Wolf",
        "Falcon",
        "Tiger",
        "Panther",
        "Phoenix",
        "Viking",
        "Cowboy",
        "Gladiator"
      ];

      let latestChat = "";
      let chatLog = [];
      let username = adjectives[Math.floor(Math.random() * adjectives.length)] + nouns[Math.floor(Math.random() * nouns.length)] + String(Math.floor(Math.random() * 10000));

      sendMsgBtn.onclick = async function() {
        chatLog.push(username + ": " + typeHere.value);
        latestChat = username + ": " + typeHere.value;
        await uploadToServer(latestChat);
        chats.value = formatValues();
        typeHere.value = "";
      }

      async function uploadToServer() {
        await setDoc(saveRef, {
          lastUsername: username,
          lastChatDate: serverTimestamp(),
          lastMessage: latestChat,
        })
      }

      function formatValues() {
        let newChatOrdered = [];
        for (let i = (chatLog.length - 1); i >= 0; i--) {
          newChatOrdered.push(chatLog[i]);
        }
        return newChatOrdered.join("\n");
      }

      onSnapshot(saveRef, (docSnap) => {
        if (!docSnap.exists()) return

        const data = docSnap.data();

        if (data.lastMessage === latestChat) return
        if (!data.lastMessage) return;

        const sentAt = data.lastChatDate?.toDate ? data.lastChatDate.toDate().toLocaleTimeString() : "pending";

        latestChat = data.lastMessage + " (Sent at " + sentAt + ")"
        chatLog.push(latestChat);
        chats.value = formatValues();
      })
    </script>
  </body>
</html>
