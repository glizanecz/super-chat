<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Super Chat</title>
    <link rel="icon" href="./messageSymbol.png" type="image/png">
    <style>
        .background {
            background-color: rgb(165, 216, 234);
            border-radius: 20px;
            border: 2px solid rgb(29, 108, 168);
            display: grid;
            place-items: center;
        }
    </style>
  </head>
  <body>
    <main>
        <div class="background">
            <h2>Welcome to Super Chat</h2>  
            <h3>Chat Log:</h3>  
            <textarea readonly id="chats" placeholder="The conversation starts here..."></textarea>
            <h3>Type Area:</h3>  
            <textarea id="typehere" placeholder="Type your message here..."></textarea>
            <button id="sendMsgBtn">Send Message</button>
        </div>
    </main>
    <script type="module">

    </script>
  </body>
</html>
