<!DOCTYPE html>
<html>
<head>
  <title>Super Chat</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      font-family: Arial, sans-serif;
      color: #0f172a;
    }

    button, input {
      font-family: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .panel {
      width: min(96vw, 520px);
      height: min(92vh, 760px);
      background: white;
      border-radius: 26px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .topBar {
      padding: 22px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
    }

    .topBar h1 {
      margin: 0;
      font-size: 32px;
    }

    .topBar p {
      margin: 6px 0 0;
      opacity: 0.85;
      font-size: 14px;
    }

    .content {
      padding: 20px;
      overflow-y: auto;
    }

    .section {
      margin-bottom: 20px;
    }

    .sectionTitle {
      margin: 0 0 10px;
      font-size: 13px;
      color: #64748b;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .inputRow {
      display: flex;
      gap: 10px;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 15px;
      font-size: 15px;
      outline: none;
      background: #f8fafc;
    }

    input:focus {
      border-color: #6366f1;
      background: white;
    }

    .primaryBtn,
    .secondaryBtn,
    .ghostBtn,
    .chatSelectBtn,
    .sendBtn {
      border: none;
      border-radius: 15px;
      font-weight: 800;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .primaryBtn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      font-size: 16px;
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.33);
    }

    .secondaryBtn {
      padding: 0 18px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 15px;
      white-space: nowrap;
    }

    .ghostBtn {
      padding: 12px 14px;
      background: #f8fafc;
      color: #475569;
      border: 2px solid #e2e8f0;
    }

    .primaryBtn:hover,
    .secondaryBtn:hover,
    .ghostBtn:hover,
    .chatSelectBtn:hover,
    .sendBtn:hover {
      transform: translateY(-2px);
    }

    .hintBox {
      padding: 14px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #64748b;
      font-size: 14px;
      line-height: 1.4;
    }

    .chatList {
      display: grid;
      gap: 10px;
    }

    .chatSelectBtn {
      width: 100%;
      padding: 15px;
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      color: #0f172a;
      text-align: left;
      font-size: 15px;
    }

    .chatSelectBtn span {
      display: block;
      margin-top: 5px;
      color: #64748b;
      font-size: 13px;
      font-weight: 600;
    }

    .screen {
      display: none;
      height: 100%;
      flex-direction: column;
    }

    .screen.active {
      display: flex;
    }

    .chatHeader {
      padding: 16px 18px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    .chatHeader h2 {
      margin: 0;
      font-size: 20px;
    }

    .chatHeader p {
      margin: 3px 0 0;
      font-size: 13px;
      opacity: 0.85;
    }

    .headerButtons {
      display: flex;
      gap: 8px;
    }

    .iconBtn {
      border: none;
      background: rgba(255, 255, 255, 0.18);
      color: white;
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 800;
    }

    .messages {
      flex: 1;
      padding: 18px;
      overflow-y: auto;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 82%;
      padding: 11px 13px;
      border-radius: 17px;
      font-size: 15px;
      line-height: 1.35;
    }

    .message.other {
      align-self: flex-start;
      background: white;
      border: 1px solid #e2e8f0;
    }

    .message.mine {
      align-self: flex-end;
      background: #4f46e5;
      color: white;
    }

    .messageName {
      display: block;
      font-size: 12px;
      font-weight: 800;
      opacity: 0.7;
      margin-bottom: 4px;
    }

    .sendArea {
      padding: 14px;
      display: flex;
      gap: 10px;
      background: white;
      border-top: 1px solid #e2e8f0;
    }

    .sendBtn {
      padding: 0 18px;
      background: #4f46e5;
      color: white;
      font-size: 15px;
    }

    .settingsRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #e2e8f0;
    }

    .settingsRow:last-child {
      border-bottom: none;
    }

    .settingsRow strong {
      display: block;
      font-size: 15px;
    }

    .settingsRow span {
      display: block;
      color: #64748b;
      font-size: 13px;
      margin-top: 3px;
    }

    @media (max-width: 520px) {
      .app {
        padding: 0;
      }

      .panel {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
      }

      .inputRow,
      .sendArea {
        flex-direction: column;
      }

      .secondaryBtn,
      .sendBtn {
        padding: 14px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <div class="panel">

      <section id="mainMenu" class="screen active">
        <div class="topBar">
          <h1>Super Chat</h1>
          <p>Create, join, and manage simple chat rooms.</p>
        </div>

        <div class="content">
          <div class="section">
            <p class="sectionTitle">Display Name</p>
            <input id="nameInput" type="text" placeholder="Enter your name">
          </div>

          <div class="section">
            <p class="sectionTitle">Create Chat</p>
            <button id="makeChatBtn" class="primaryBtn">Make New Chat</button>
          </div>

          <div class="section">
            <p class="sectionTitle">Join Chat</p>
            <div class="inputRow">
              <input id="chatIdInput" type="text" placeholder="Enter chat ID">
              <button id="joinChatBtn" class="secondaryBtn">Join</button>
            </div>
          </div>

          <div class="section">
            <p class="sectionTitle">Your Chats</p>

            <div id="chatList" class="chatList">
              <button class="chatSelectBtn" onclick="openChat('Example Chat', 'ABC123')">
                Example Chat
                <span>ID: ABC123 • 2 messages</span>
              </button>

              <button class="chatSelectBtn" onclick="openChat('Friends Room', 'XYZ789')">
                Friends Room
                <span>ID: XYZ789 • 0 messages</span>
              </button>
            </div>
          </div>
        </div>
      </section>

      <section id="chatScreen" class="screen">
        <div class="chatHeader">
          <div>
            <h2 id="chatNameDisplay">New Chat</h2>
            <p id="chatIdDisplay">Chat ID: TEMP</p>
          </div>

          <div class="headerButtons">
            <button id="settingsBtn" class="iconBtn">Settings</button>
            <button id="backBtn" class="iconBtn">Back</button>
          </div>
        </div>

        <div id="messages" class="messages">
          <div class="message other">
            <span class="messageName">System</span>
            Chat opened.
          </div>

          <div class="message mine">
            <span class="messageName">You</span>
            This is a test message.
          </div>
        </div>

        <div class="sendArea">
          <input id="messageInput" type="text" placeholder="Type a message...">
          <button id="sendBtn" class="sendBtn">Send</button>
        </div>
      </section>

      <section id="settingsScreen" class="screen">
        <div class="chatHeader">
          <div>
            <h2>Chat Settings</h2>
            <p>Basic room controls.</p>
          </div>

          <button id="closeSettingsBtn" class="iconBtn">Back</button>
        </div>

        <div class="content">
          <div class="section">
            <p class="sectionTitle">Room Info</p>

            <div class="settingsRow">
              <div>
                <strong>Chat Name</strong>
                <span id="settingsChatName">New Chat</span>
              </div>
            </div>

            <div class="settingsRow">
              <div>
                <strong>Chat ID</strong>
                <span id="settingsChatId">TEMP</span>
              </div>
            </div>
          </div>

          <div class="section">
            <p class="sectionTitle">Actions</p>

            <button id="copyChatIdBtn" class="primaryBtn">Copy Chat ID</button>
            <br><br>
            <button id="leaveChatBtn" class="ghostBtn">Leave Chat</button>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script type="module">
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    const mainMenu = document.getElementById("mainMenu");
    const chatScreen = document.getElementById("chatScreen");
    const settingsScreen = document.getElementById("settingsScreen");

    const makeChatBtn = document.getElementById("makeChatBtn");
    const joinChatBtn = document.getElementById("joinChatBtn");
    const backBtn = document.getElementById("backBtn");
    const settingsBtn = document.getElementById("settingsBtn");
    const closeSettingsBtn = document.getElementById("closeSettingsBtn");
    const copyChatIdBtn = document.getElementById("copyChatIdBtn");
    const leaveChatBtn = document.getElementById("leaveChatBtn");
    const sendBtn = document.getElementById("sendBtn");

    const chatIdInput = document.getElementById("chatIdInput");
    const messageInput = document.getElementById("messageInput");

    const chatNameDisplay = document.getElementById("chatNameDisplay");
    const chatIdDisplay = document.getElementById("chatIdDisplay");
    const settingsChatName = document.getElementById("settingsChatName");
    const settingsChatId = document.getElementById("settingsChatId");
    const messages = document.getElementById("messages");

    let currentChatName = "New Chat";
    let currentChatId = "TEMP";

    function showScreen(screen) {
      mainMenu.classList.remove("active");
      chatScreen.classList.remove("active");
      settingsScreen.classList.remove("active");

      screen.classList.add("active");
    }

    window.openChat = function(name, id) {
      currentChatName = name;
      currentChatId = id;

      chatNameDisplay.textContent = name;
      chatIdDisplay.textContent = "Chat ID: " + id;

      settingsChatName.textContent = name;
      settingsChatId.textContent = id;

      showScreen(chatScreen);
    }

    makeChatBtn.onclick = function() {
      let currentChatName = "New Chat";
      let currentChatId = String(Math.floor(Math.random() * 6000))
      openChat("New Chat", currentChatId);
    }

    joinChatBtn.onclick = function() {
      const typedId = chatIdInput.value.trim();

      if (typedId === "") {
        openChat("Joined Chat", "TEMP");
      } else {
        openChat("Joined Chat", typedId);
      }
    }

    backBtn.onclick = function() {
      showScreen(mainMenu);
    }

    settingsBtn.onclick = function() {
      showScreen(settingsScreen);
    }

    closeSettingsBtn.onclick = function() {
      showScreen(chatScreen);
    }

    leaveChatBtn.onclick = function() {
      showScreen(mainMenu);
    }

    copyChatIdBtn.onclick = function() {
      navigator.clipboard.writeText(currentChatId);
      copyChatIdBtn.textContent = "Copied";
      setTimeout(function() {
        copyChatIdBtn.textContent = "Copy Chat ID";
      }, 1000);
    }

    sendBtn.onclick = function() {
      const text = messageInput.value.trim();

      if (text === "") {
        return;
      }

      const newMessage = document.createElement("div");
      newMessage.className = "message mine";
      newMessage.innerHTML = '<span class="messageName">You</span>' + text;

      messages.appendChild(newMessage);
      messageInput.value = "";
      messages.scrollTop = messages.scrollHeight;
    }

    messageInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        sendBtn.click();
      }
    });
  </script>
</body>
</html>
